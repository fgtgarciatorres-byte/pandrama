<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Telenovela Live Prototype</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0f1a;
    color: white;
    display: flex;
    height: 100vh;
  }

  .container {
    display: grid;
    grid-template-columns: 200px 1fr 300px;
    width: 100%;
  }

  /* INVENTARIO */
  .left {
    background: #111;
    padding: 10px;
    border-right: 2px solid #222;
  }

  .item {
    background: #1a1a1a;
    padding: 8px;
    margin: 5px 0;
    cursor: pointer;
  }

  /* ESCENARIO */
  .center {
    position: relative;
    background: url('https://picsum.photos/800/600?blur=3') center/cover;
  }

  .character {
    position: absolute;
    bottom: 50px;
    width: 150px;
    text-align: center;
    transition: all 0.3s ease;
  }

  #charA { left: 20%; }
  #charB { right: 20%; }

  .pose {
    font-size: 60px;
  }

  .subtitle {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 20px;
    background: rgba(0,0,0,0.6);
    padding: 10px;
  }

  /* PANEL */
  .right {
    background: #111;
    padding: 10px;
    border-left: 2px solid #222;
  }

  button {
    margin: 5px;
    padding: 10px;
    cursor: pointer;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
  }

</style>
</head>
<body>

<div class="container">

  <!-- INVENTARIO -->
  <div class="left">
    <h3>Inventario</h3>
    <div class="item" onclick="effect('🍇')">Uvas</div>
    <div class="item" onclick="effect('👜')">Bolso G</div>
  </div>

  <!-- ESCENARIO -->
  <div class="center">
    <div id="charA" class="character">
      <div class="pose" id="poseA">🙂</div>
      <div>Jugador A</div>
    </div>

    <div id="charB" class="character">
      <div class="pose" id="poseB">😈</div>
      <div>Jugador B</div>
    </div>

    <div id="subtitle" class="subtitle">
      Esperando drama...
    </div>
  </div>

  <!-- PANEL -->
  <div class="right">
    <h3>Control</h3>

    <b>Jugador:</b>
    <select id="player">
      <option value="A">Jugador A</option>
      <option value="B">Jugador B</option>
    </select>

    <h4>Poses</h4>
    <button onclick="setPose('🙂')">Neutral</button>
    <button onclick="setPose('😡')">Ataque</button>
    <button onclick="setPose('😂')">Risa</button>
    <button onclick="setPose('😢')">Drama</button>

    <input id="text" placeholder="Escribe tu frase dramática..." />
    <button onclick="send()">ENVIAR</button>

  </div>

</div>

<script>

let state = {
  A: { pose: "🙂", text: "" },
  B: { pose: "😈", text: "" }
};

function setPose(pose) {
  const player = document.getElementById("player").value;
  state[player].pose = pose;
  render();
}

function send() {
  const player = document.getElementById("player").value;
  const text = document.getElementById("text").value;

  state[player].text = text;

  render();

  document.getElementById("text").value = "";
}

function effect(icon) {
  document.getElementById("subtitle").innerText += " " + icon;
}

function render() {
  document.getElementById("poseA").innerText = state.A.pose;
  document.getElementById("poseB").innerText = state.B.pose;

  // Última intervención domina
  let lastText = state.A.text || state.B.text;
  document.getElementById("subtitle").innerText = lastText || "Esperando drama...";
}

</script>

</body>
</html>
