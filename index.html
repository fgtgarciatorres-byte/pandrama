<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Panificador: Pan-Runner 2026</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-container { position: relative; border: 4px solid #ffd700; }
        canvas { display: block; background-color: #000; image-rendering: pixelated; }
    </style>
</head>
<body>

    <h2>NIVEL 1: BULEVAR DE LOS NEONES</h2>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>
    <p>Usa las <b>Flechas Izquierda/Derecha</b> para correr y <b>Espacio</b> para atacar.</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- CARGA DE IMÁGENES ---
        // Cargar el fondo
        const backgroundImage = new Image();
        backgroundImage.src = 'fondo.png'; // IMPORTANTE: El nombre debe coincidir exactamente

        // Cargar el personaje
        const spriteSheet = new Image();
        spriteSheet.src = 'panificador_run.png';

        // --- CONFIGURACIÓN ---
        // Variables para el desplazamiento del fondo
        const backgroundSpeed = 2; // Velocidad a la que se mueve el fondo
        let backgroundX = 0; // Posición actual del fondo

        // Ajuste según tu hoja de sprites real
        const spriteConfig = {
            frameWidth: 128,  
            frameHeight: 128, 
            totalFrames: 6,   
            animSpeed: 8,
            currentFrame: 0,
            counter: 0
        };

        const player = {
            x: 50, y: 230,
            speed: 5,
            isMoving: false,
            dir: 1
        };

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- ACTUALIZACIÓN DE LÓGICA ---
        function update() {
            player.isMoving = false;
            
            // Movimiento del jugador
            if (keys['ArrowRight']) { player.x += player.speed; player.dir = 1; player.isMoving = true; }
            if (keys['ArrowLeft']) { player.x -= player.speed; player.dir = -1; player.isMoving = true; }

            // Lógica de desplazamiento del fondo
            if (player.isMoving && player.dir === 1) {
                backgroundX -= backgroundSpeed; // El fondo se mueve a la izquierda
            } else if (player.isMoving && player.dir === -1) {
                backgroundX += backgroundSpeed; // El fondo se mueve a la derecha
            }

            // Asegurarse de que el fondo se repita
            if (backgroundX <= -backgroundImage.width) {
                backgroundX = 0;
            } else if (backgroundX > 0) {
                backgroundX = -backgroundImage.width;
            }

            // Animación del personaje
            if (player.isMoving) {
                spriteConfig.counter++;
                if (spriteConfig.counter >= spriteConfig.animSpeed) {
                    spriteConfig.currentFrame = (spriteConfig.currentFrame + 1) % spriteConfig.totalFrames;
                    spriteConfig.counter = 0;
                }
            } else {
                spriteConfig.currentFrame = 0;
            }
        }

        // --- DIBUJADO ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar el fondo (se dibuja dos veces para el bucle)
            ctx.drawImage(backgroundImage, backgroundX, 0);
            ctx.drawImage(backgroundImage, backgroundX + backgroundImage.width, 0);

            // Dibujar Sprite del jugador
            const sx = spriteConfig.currentFrame * spriteConfig.frameWidth;
            
            ctx.save();
            if (player.dir === -1) {
                ctx.scale(-1, 1);
                ctx.drawImage(spriteSheet, sx, 0, spriteConfig.frameWidth, spriteConfig.frameHeight, -player.x - 100, player.y, 100, 100);
            } else {
                ctx.drawImage(spriteSheet, sx, 0, spriteConfig.frameWidth, spriteConfig.frameHeight, player.x, player.y, 100, 100);
            }
            ctx.restore();
        }

        // --- BUCLE PRINCIPAL ---
        function main() {
            update();
            draw();
            requestAnimationFrame(main);
        }

        // Iniciar cuando las imágenes estén cargadas
        // Necesitamos asegurarnos de que ambas imágenes se carguen antes de empezar
        let loadedImages = 0;
        const totalImages = 2;

        const onImageLoad = () => {
            loadedImages++;
            if (loadedImages === totalImages) {
                main();
            }
        };

        backgroundImage.onload = onImageLoad;
        spriteSheet.onload = onImageLoad;
    </script>
</body>
</html>
