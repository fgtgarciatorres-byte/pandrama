<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Panificador: Pan-Runner 2026</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-container { border: 4px solid #ffd700; background: #000; line-height: 0; }
        canvas { image-rendering: pixelated; width: 800px; height: 400px; }
    </style>
</head>
<body>

    <h2>NIVEL 1: BULEVAR DE LOS NEONES</h2>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>
    <p>Usa las <b>Flechas</b> para moverte. El personaje ahora está centrado.</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- CARGA DE IMÁGENES ---
        const backgroundImage = new Image();
        backgroundImage.src = 'fondo.png'; 

        const spriteSheet = new Image();
        spriteSheet.src = 'panificador_run.png';

        // --- CONFIGURACIÓN TÉCNICA ---
        // Basado en tus archivos: tu hoja de sprites tiene celdas grandes.
        // Vamos a recortar un área de 300x300 aproximadamente para asegurar que salga todo el cuerpo.
        const FRAME_W = 350; 
        const FRAME_H = 350; 
        const TOTAL_FRAMES = 6;
        
        // Escalado del personaje dentro del juego (0.4 lo hace ver normal, no gigante)
        const PLAYER_SCALE = 0.4; 

        const player = {
            x: 100,
            y: 200, 
            width: FRAME_W * PLAYER_SCALE,
            height: FRAME_H * PLAYER_SCALE,
            currentFrame: 0,
            counter: 0,
            speed: 5,
            dir: 1,
            isMoving: false
        };

        let bgX = 0;

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            player.isMoving = false;
            if (keys['ArrowRight']) { bgX -= 3; player.dir = 1; player.isMoving = true; }
            if (keys['ArrowLeft']) { bgX += 3; player.dir = -1; player.isMoving = true; }

            // Animación
            if (player.isMoving) {
                player.counter++;
                if (player.counter > 10) {
                    player.currentFrame = (player.currentFrame + 1) % TOTAL_FRAMES;
                    player.counter = 0;
                }
            } else {
                player.currentFrame = 0;
            }

            // Bucle infinito del fondo
            if (bgX <= -canvas.width) bgX = 0;
            if (bgX > 0) bgX = -canvas.width;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. DIBUJAR FONDO: Forzamos a que la imagen se estire/encoja al tamaño del canvas
            if (backgroundImage.complete) {
                ctx.drawImage(backgroundImage, bgX, 0, canvas.width, canvas.height);
                ctx.drawImage(backgroundImage, bgX + canvas.width, 0, canvas.width, canvas.height);
            }

            // 2. DIBUJAR SPRITE: Usamos recortes proporcionales
            const sx = player.currentFrame * (spriteSheet.width / TOTAL_FRAMES);
            
            ctx.save();
            if (player.dir === -1) {
                ctx.scale(-1, 1);
                ctx.drawImage(
                    spriteSheet,
                    sx, 0, spriteSheet.width / TOTAL_FRAMES, spriteSheet.height / 2, // Recorte fila 1
                    -player.x - player.width, player.y, player.width, player.height
                );
            } else {
                ctx.drawImage(
                    spriteSheet,
                    sx, 0, spriteSheet.width / TOTAL_FRAMES, spriteSheet.height / 2, // Recorte fila 1
                    player.x, player.y, player.width, player.height
                );
            }
            ctx.restore();
        }

        function main() {
            update();
            draw();
            requestAnimationFrame(main);
        }

        spriteSheet.onload = () => main();
    </script>
</body>
</html>
