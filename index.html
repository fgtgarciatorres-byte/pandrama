<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Panificador: Pan-Runner 2026</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-container { position: relative; border: 4px solid #ffd700; }
        canvas { display: block; background-color: #000; image-rendering: pixelated; } /* Para que no se vea borroso */
    </style>
</head>
<body>

    <h2>NIVEL 1: BULEVAR DE LOS NEONES</h2>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>
    <p>Usa las <b>Flechas</b> para correr y <b>Espacio</b> para atacar.</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Carga de imágenes
        const spriteSheet = new Image();
        spriteSheet.src = 'panificador_run.png'; // Asegúrate de que el nombre sea exacto

        // Ajuste según tu hoja de sprites real
        const spriteConfig = {
            frameWidth: 128,  // Ajusta este número según el ancho de UN solo frame en tu archivo
            frameHeight: 128, // Ajusta este número según el alto
            totalFrames: 6,   // Cuántos cuadros de movimiento tiene la fila de arriba
            animSpeed: 8,
            currentFrame: 0,
            counter: 0
        };

        const player = {
            x: 50, y: 230,
            speed: 5,
            isMoving: false,
            dir: 1
        };

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            player.isMoving = false;
            if (keys['ArrowRight']) { player.x += player.speed; player.dir = 1; player.isMoving = true; }
            if (keys['ArrowLeft']) { player.x -= player.speed; player.dir = -1; player.isMoving = true; }

            if (player.isMoving) {
                spriteConfig.counter++;
                if (spriteConfig.counter >= spriteConfig.animSpeed) {
                    spriteConfig.currentFrame = (spriteConfig.currentFrame + 1) % spriteConfig.totalFrames;
                    spriteConfig.counter = 0;
                }
            } else {
                spriteConfig.currentFrame = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar suelo
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 350, canvas.width, 50);

            // Dibujar Sprite
            const sx = spriteConfig.currentFrame * spriteConfig.frameWidth;
            
            ctx.save();
            if (player.dir === -1) {
                ctx.scale(-1, 1);
                ctx.drawImage(spriteSheet, sx, 0, spriteConfig.frameWidth, spriteConfig.frameHeight, -player.x - 100, player.y, 100, 100);
            } else {
                ctx.drawImage(spriteSheet, sx, 0, spriteConfig.frameWidth, spriteConfig.frameHeight, player.x, player.y, 100, 100);
            }
            ctx.restore();
        }

        function main() {
            update();
            draw();
            requestAnimationFrame(main);
        }

        spriteSheet.onload = () => main();
    </script>
</body>
</html>
