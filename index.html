<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Telenovela Live V2</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0f1a;
  color: white;
}

.container {
  display: grid;
  grid-template-columns: 1fr 300px;
  height: 100vh;
}

/* ESCENA */
.scene {
  position: relative;
  background: #1a1f2e;
  display: flex;
  align-items: center;
  justify-content: space-around;
}

.character {
  text-align: center;
  transition: transform 0.2s;
}

.active {
  transform: scale(1.2);
  filter: drop-shadow(0 0 10px cyan);
}

.pose {
  font-size: 80px;
}

/* SUBTÍTULOS */
.subtitles {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  padding: 10px;
}

.lineA { color: #00d4ff; }
.lineB { color: #ff4d6d; }

/* PANEL */
.panel {
  background: #111;
  padding: 15px;
}

button {
  margin: 5px;
  padding: 10px;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">

  <!-- ESCENA -->
  <div class="scene">

    <div id="charA" class="character">
      <div class="pose" id="poseA">🙂</div>
      <div>Jugador A</div>
    </div>

    <div id="charB" class="character">
      <div class="pose" id="poseB">😈</div>
      <div>Jugador B</div>
    </div>

    <div class="subtitles">
      <div id="lineA" class="lineA">...</div>
      <div id="lineB" class="lineB">...</div>
    </div>

  </div>

  <!-- PANEL -->
  <div class="panel">

    <h3>Turno: <span id="turn">A</span></h3>

    <h4>Poses</h4>
    <button onclick="setPose('🙂')">Neutral</button>
    <button onclick="setPose('😡')">Ataque</button>
    <button onclick="setPose('😂')">Risa</button>
    <button onclick="setPose('😢')">Drama</button>

    <input id="text" placeholder="Tu frase..." />
    <button onclick="send()">ENVIAR</button>

  </div>

</div>

<script>

let turn = "A";

let state = {
  A: { pose: "🙂", text: "" },
  B: { pose: "😈", text: "" }
};

function setPose(pose) {
  state[turn].pose = pose;
  render();
}

function send() {
  const text = document.getElementById("text").value;
  if (!text) return;

  state[turn].text = text;

  // alternar turno
  turn = turn === "A" ? "B" : "A";

  document.getElementById("text").value = "";

  render();
}

function render() {

  document.getElementById("poseA").innerText = state.A.pose;
  document.getElementById("poseB").innerText = state.B.pose;

  document.getElementById("lineA").innerText = "A: " + state.A.text;
  document.getElementById("lineB").innerText = "B: " + state.B.text;

  document.getElementById("turn").innerText = turn;

  document.getElementById("charA").classList.toggle("active", turn === "A");
  document.getElementById("charB").classList.toggle("active", turn === "B");

}

render();

</script>

</body>
</html>
